# ═══════════════════════════════════════════════════════════════════════
# Sparki — Onafhankelijk Dashboarding-platform
# Docker Compose: 6 services, één intern netwerk, één externe entrypoint
# ═══════════════════════════════════════════════════════════════════════
#
# Services:
#   1. postgres   — relationele opslag (organizations, sites, buildings, users, audit_log)
#   2. influxdb   — tijdreeksopslag (energie-metingen, prijzen)
#   3. keycloak   — authenticatie + gebruikersbeheer
#   4. node-red   — data-ingestie (Sigencloud + ENTSO-E → InfluxDB)
#   5. webapp     — FastAPI + Jinja2 + HTMX
#   6. caddy      — reverse proxy + (later) HTTPS
#
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f <service>

services:

  # ─── 1. PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sparki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - sparki_net
    # Only exposed to host during dev for direct psql/DBeaver access.
    # Comment out in production — webapp connects via internal network.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 2. InfluxDB ─────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: sparki-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
      TZ: ${TZ}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - sparki_net
    # Exposed to host during dev for UI access at http://localhost:8086
    ports:
      - "127.0.0.1:8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 3. Keycloak ─────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: sparki-keycloak
    restart: unless-stopped
    command:
      - start-dev                      # dev mode — switch to `start` in prod
      - --import-realm                 # auto-import realm config on boot
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak           # isolated schema in shared DB
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # KC_PROXY_HEADERS: xforwarded     # behind Caddy
      TZ: ${TZ}
    volumes:
      - ./keycloak/realm-export:/opt/keycloak/data/import:ro
    networks:
      - sparki_net
    ports:
      - "127.0.0.1:8080:8080"          # dev only — Caddy proxies in prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200 OK'"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── 4. Node-RED ─────────────────────────────────────────────────────
  # Headless ingestion worker. Admin UI is enabled in dev for flow editing,
  # but disabled in production via settings.js.
  # NOTE: Custom Dockerfile + settings.js + flows komen in Fase 2.
  # Voor nu starten we de stock image zonder admin password — uncomment
  # zodra de flows + settings.js klaar zijn.
