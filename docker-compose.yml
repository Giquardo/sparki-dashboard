# ═══════════════════════════════════════════════════════════════════════
# Sparki — Onafhankelijk Dashboarding-platform
# Docker Compose: 6 services, één intern netwerk, één externe entrypoint
# ═══════════════════════════════════════════════════════════════════════
#
# Services:
#   1. postgres   — relationele opslag (organizations, sites, buildings, users, audit_log)
#   2. influxdb   — tijdreeksopslag (energie-metingen, prijzen)
#   3. keycloak   — authenticatie + gebruikersbeheer
#   4. node-red   — data-ingestie (Sigencloud + ENTSO-E → InfluxDB)
#   5. webapp     — FastAPI + Jinja2 + HTMX
#   6. caddy      — reverse proxy + (later) HTTPS
#
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f <service>

services:

  # ─── 1. PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sparki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - sparki_net
    # Only exposed to host during dev for direct psql/DBeaver access.
    # Comment out in production — webapp connects via internal network.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 2. InfluxDB ─────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: sparki-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
      TZ: ${TZ}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - sparki_net
    # Exposed to host during dev for UI access at http://localhost:8086
    ports:
      - "127.0.0.1:8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 3. Keycloak ─────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: sparki-keycloak
    restart: unless-stopped
    command:
      - start-dev                      # dev mode — switch to `start` in prod
      - --import-realm                 # auto-import realm config on boot
    environment:
      # In start-dev mode use the classic KEYCLOAK_ADMIN/_PASSWORD vars.
      # KC_BOOTSTRAP_ADMIN_* is for non-dev mode and triggers the
      # "Local access required" screen when used here.
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak           # schema pre-created by postgres/init/01-create-keycloak-schema.sql
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # KC_PROXY_HEADERS: xforwarded   # Re-enable when Caddy is in front
      TZ: ${TZ}
    volumes:
      - ./keycloak/realm-export:/opt/keycloak/data/import:ro
    networks:
      - sparki_net
    ports:
      - "127.0.0.1:8080:8080"          # dev only — Caddy proxies in prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200 OK'"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ─── 4. Node-RED ─────────────────────────────────────────────────────
  # Headless ingestion worker. Admin UI is enabled in dev for flow editing,
  # but disabled in production via settings.js.
  node-red:
    build: ./node-red
    container_name: sparki-nodered
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      # Node-RED admin UI
      NODERED_ADMIN_USER: ${NODERED_ADMIN_USER}
      NODERED_ADMIN_PASSWORD_HASH: ${NODERED_ADMIN_PASSWORD_HASH}
      NODERED_UI_ENABLED: ${NODERED_UI_ENABLED}
      NODERED_CREDENTIAL_SECRET: ${WEBAPP_SECRET_KEY}   # reuse webapp secret for flow-cred encryption
      # Connection info for downstream services (consumed by flow nodes)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      SIGENCLOUD_BASE_URL: ${SIGENCLOUD_BASE_URL}
      ENTSOE_API_TOKEN: ${ENTSOE_API_TOKEN}
      ENTSOE_BIDDING_ZONE: ${ENTSOE_BIDDING_ZONE}
    volumes:
      # Named volume holds runtime state including the live flows.json.
      # On first boot, the image's entrypoint seeds /data/flows.json from
      # the baked-in copy. After that, Node-RED owns it — edit via UI.
      - nodered-data:/data
      # settings.js is bind-mounted READ-ONLY so changes don't require a
      # volume reset. Node-RED never writes to settings.js.
      - ./node-red/settings.js:/data/settings.js:ro
    networks:
      - sparki_net
    # Exposed to host on 127.0.0.1 only — UI is admin-only in dev.
    # In production, set NODERED_UI_ENABLED=false and remove this port.
    ports:
      - "127.0.0.1:1880:1880"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  # ─── 5. FastAPI Webapp ───────────────────────────────────────────────
  webapp:
    build: ./webapp
    container_name: sparki-webapp
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      TZ: ${TZ}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INFLUXDB_HOST: influxdb
      INFLUXDB_PORT: 8086
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      # These two are only consumed by scripts/seed.py via the admin API.
      # They're not needed by FastAPI for request handling.
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      WEBAPP_SECRET_KEY: ${WEBAPP_SECRET_KEY}
      FERNET_KEY: ${FERNET_KEY}
    networks:
      - sparki_net
    # Exposed to host during dev; in prod Caddy proxies on its place.
    ports:
      - "127.0.0.1:8000:8000"
    # Mount scripts read-only so we can run them via `docker compose exec`
    # without rebuilding the image. Templates + static are also bind-mounted
    # read-only in dev for hot-reload — edits show on next browser refresh
    # without an image rebuild. The same files are baked into the image
    # via the Dockerfile so production runs without bind mounts.
    volumes:
      - ./scripts:/app/scripts:ro
      - ./webapp/templates:/app/templates:ro
      - ./webapp/static:/app/static:ro
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    # Healthcheck is also defined inside the Dockerfile; this overrides
    # the timing for Compose's perspective.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── 6. Caddy (reverse proxy) ────────────────────────────────────────
  # NOTE: Activated zodra webapp draait. Caddyfile staat al klaar.
  #
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: sparki-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     CADDY_DOMAIN: ${CADDY_DOMAIN}
  #   volumes:
  #     - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   networks:
  #     - sparki_net
  #   depends_on:
  #     - webapp
  #     - keycloak

# ─── Networks ──────────────────────────────────────────────────────────
networks:
  sparki_net:
    name: sparki_net
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────
volumes:
  postgres-data:
    name: sparki-postgres-data
  influxdb-data:
    name: sparki-influxdb-data
  influxdb-config:
    name: sparki-influxdb-config
  nodered-data:
    name: sparki-nodered-data
  caddy-data:
    name: sparki-caddy-data
  caddy-config:
    name: sparki-caddy-config
