  #     INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
  #     INFLUXDB_ORG: ${INFLUXDB_ORG}
  #     INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
  #     SIGENCLOUD_BASE_URL: ${SIGENCLOUD_BASE_URL}
  #     ENTSOE_API_TOKEN: ${ENTSOE_API_TOKEN}
  #     ENTSOE_BIDDING_ZONE: ${ENTSOE_BIDDING_ZONE}
