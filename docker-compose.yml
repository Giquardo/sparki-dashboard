  #     - webapp
  #     - keycloak

# ─── Networks ──────────────────────────────────────────────────────────
networks:
  sparki_net:
    name: sparki_net
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────
volumes:
  postgres-data:
    name: sparki-postgres-data
  influxdb-data:
    name: sparki-influxdb-data
  influxdb-config:
    name: sparki-influxdb-config
  nodered-data:
    name: sparki-nodered-data
  caddy-data:
    name: sparki-caddy-data
  caddy-config:
    name: sparki-caddy-config
