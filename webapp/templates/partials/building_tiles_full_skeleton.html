{#
  Loading skeleton for the full live-metric section on the detail page.
  Mirrors the four-section layout so there's minimal layout shift when
  the real fragment swaps in.
#}
<div class="space-y-4 animate-pulse">
    {% for section in range(4) %}
    <div>
        <div class="h-2.5 w-20 rounded bg-sparki-navy-soft mb-2"></div>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
            {% for _ in range(4) %}
            <div class="rounded-lg bg-sparki-navy/40 px-3 py-3">
                <div class="h-2 w-12 rounded bg-sparki-navy-soft mb-2"></div>
                <div class="h-5 w-14 rounded bg-sparki-navy-soft mb-1.5"></div>
                <div class="h-2 w-8 rounded bg-sparki-navy-soft"></div>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
