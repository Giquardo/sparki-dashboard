# ═══════════════════════════════════════════════════════════════════════
# Alembic configuration for Sparki webapp
# ═══════════════════════════════════════════════════════════════════════
# We override sqlalchemy.url programmatically in env.py using values from
# app.config.settings — so the URL below is only a placeholder.

[alembic]
# Where Alembic looks for migration scripts
script_location = migrations

# Template used by `alembic revision`
file_template = %%(rev)s_%%(slug)s

# Sets the timezone for migration timestamps to UTC
timezone = UTC

# Required key — overridden in env.py
sqlalchemy.url = driver://user:pass@host/dbname

# ─── Logging ─────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
